name: Hugo build check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_ENV: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Fetch theme
        run: |
          git submodule sync --recursive
          git submodule update --init --depth 1 themes/hugo-nuo

      - name: Build site
        run: hugo -t hugo-nuo
